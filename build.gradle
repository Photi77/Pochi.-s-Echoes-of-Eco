plugins {
    id 'eclipse'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.0.+'
}

version = '0.0.5-1.21.1'
group = 'com.pochi.pochimod'
archivesBaseName = 'EchoesOfEco'

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

println "Java: ${System.getProperty 'java.version'}, JVM: ${System.getProperty 'java.vm.version'} (${System.getProperty 'java.vendor'}), Arch: ${System.getProperty 'os.arch'}"

runs {
    configureEach {
        systemProperty 'forge.logging.markers', 'REGISTRIES'
        systemProperty 'forge.logging.console.level', 'debug'
        modSource project.sourceSets.main
    }

    client {
        systemProperty 'neoforge.enabledGameTestNamespaces', 'pochimod'
    }

    server {
        programArgument '--nogui'
        systemProperty 'neoforge.enabledGameTestNamespaces', 'pochimod'
    }

    data {
        programArguments.addAll '--mod', 'pochimod', '--all',
                '--output', file('src/generated/resources/').absolutePath,
                '--existing', file('src/main/resources/').absolutePath
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    maven {
        name = "BlameJared Maven (JEI)"
        url = "https://maven.blamejared.com/"
    }
    maven {
        url = "https://cursemaven.com"
        content {
            includeGroup "curse.maven"
        }
    }
    maven {
        name = "GeckoLib"
        url = 'https://dl.cloudsmith.io/public/geckolib3/geckolib/maven/'
    }
    maven {
        name = "KosmX's maven"
        url = 'https://maven.kosmx.dev/'
    }
    maven {
        name = "MinecraftForge Maven (TerraBlender)"
        url = "https://maven.minecraftforge.net/"
    }
}

dependencies {
    implementation "net.neoforged:neoforge:${neo_version}"

    // JEI — compile against API only, use full jar at runtime
    compileOnly("mezz.jei:jei-1.21.1-neoforge-api:${jei_version}")
    runtimeOnly("mezz.jei:jei-1.21.1-neoforge:${jei_version}")

    // GeckoLib
    implementation("software.bernie.geckolib:geckolib-neoforge-1.21.1:${geckolib_version}")

    // PlayerAnimLib
    implementation("dev.kosmx.player-anim:player-animation-lib-forge:${playeranim_version}")

    // TerraBlender
    implementation("com.github.glitchfiend:TerraBlender-neoforge:${terrablender_version}")
}

jar {
    manifest {
        attributes([
                "Specification-Title"     : "pochimod",
                "Specification-Vendor"    : "pochimodsareus",
                "Specification-Version"   : "1",
                "Implementation-Title"    : project.name,
                "Implementation-Version"  : project.jar.archiveVersion,
                "Implementation-Vendor"   : "pochimodsareus",
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/mcmodsrepo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
